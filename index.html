<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Tactical Tracker v4.5</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: #00ff00; overflow: hidden; user-select: none; }
        #map { height: 100vh; width: 100vw; filter: brightness(0.3) contrast(1.5); z-index: 1; }

        /* Tactical HUD Overlay */
        #radar-hud { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 2; border: 1px solid rgba(0,255,0,0.1); }
        
        .hud-control { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0, 15, 0, 0.9); border: 1px solid #00ff00; padding: 10px; width: 250px; pointer-events: auto; }
        .hud-target { position: absolute; bottom: 20px; right: 10px; z-index: 1000; background: rgba(0, 5, 0, 0.95); border: 1px solid #00ff00; padding: 10px; min-width: 260px; display: none; pointer-events: auto; }

        input, select, button { background: #000; color: #00ff00; border: 1px solid #004400; width: 100%; margin: 5px 0; padding: 8px; font-family: monospace; }
        .btn-scan { background: #00ff00; color: #000; font-weight: bold; cursor: pointer; }
        .btn-unlock { color: #ff4444; border-color: #ff4444; cursor: pointer; }

        /* Installation Guide Popup */
        #install-guide { display:none; position:fixed; bottom:20px; left:10px; right:10px; background:rgba(0,10,0,0.98); border:2px solid #00ff00; color:#00ff00; padding:15px; z-index:9999; text-align:center; border-radius:8px; pointer-events: auto; }
        
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="radar-hud"></div>

<div class="hud-control">
    <div style="font-size: 0.6rem; opacity: 0.5;">STRATEGIC LINK: <span id="link-status" style="color:red">OFFLINE</span></div>
    <input type="range" id="rangeInput" min="50" max="5000" step="50" value="1000">
    <div style="font-size: 0.8rem;">RANGE: <span id="rangeVal">1000</span>M</div>
    
    <select id="targetClass">
        <option value="restaurant">RESTAURANTS</option>
        <option value="cafe">CAFE / HUBS</option>
        <option value="pharmacy">MEDICAL</option>
    </select>
    <input type="text" id="customSearch" placeholder="MANUAL SEARCH...">
    <button class="btn-scan" onclick="initiateScan()">INITIATE SCAN</button>
</div>

<div class="hud-target" id="targetPanel">
    <div class="blink" style="color:red; font-weight:bold;">[ TARGET ACQUIRED ]</div>
    <div id="targetName" style="margin:5px 0; font-size:1.1rem;">---</div>
    <div style="display:flex; justify-content:space-between;"><span>DIST:</span> <span id="targetDist">0</span> M</div>
    <button class="btn-unlock" onclick="unlockTarget()">RELEASE TARGET</button>
</div>

<div id="install-guide">
    <div id="guide-content"></div>
    <button onclick="document.getElementById('install-guide').style.display='none'" style="border:none; text-decoration:underline;">Close / إغلاق</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([31.95, 35.91], 17);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    let userCoords = null, targetCoords = null, targetMarker = null, lockLine = null, userMarker = null;

    // --- Audio ---
    function speak(text) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(text);
        m.lang = 'en-US'; m.pitch = 0.8; m.rate = 1.1;
        window.speechSynthesis.speak(m);
    }

    // --- Tracking ---
    navigator.geolocation.watchPosition(pos => {
        userCoords = [pos.coords.latitude, pos.coords.longitude];
        document.getElementById('link-status').innerText = 'STABLE';
        document.getElementById('link-status').style.color = '#00ff00';
        
        if(!userMarker) {
            userMarker = L.circleMarker(userCoords, { color: '#00ff00', radius: 5, fillOpacity: 1 }).addTo(map);
            map.setView(userCoords, 17);
        } else {
            userMarker.setLatLng(userCoords);
        }

        if(targetCoords) {
            const dist = Math.round(map.distance(userCoords, targetCoords));
            document.getElementById('targetDist').innerText = dist;
            lockLine.setLatLngs([userCoords, targetCoords]);
        }
    }, err => console.log(err), { enableHighAccuracy: true });

    // --- Scan ---
    async function initiateScan() {
        const range = document.getElementById('rangeInput').value;
        const custom = document.getElementById('customSearch').value.trim();
        const type = document.getElementById('targetClass').value;
        
        unlockTarget(false);
        speak("Scanning perimeter.");

        let query = custom ? `[out:json];node(around:${range},${userCoords[0]},${userCoords[1]})[name~"${custom}",i];out;` 
                           : `[out:json];node(around:${range},${userCoords[0]},${userCoords[1]})["amenity"="${type}"];out;`;
        
        try {
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await res.json();

            if (data.elements.length > 0) {
                const t = data.elements[Math.floor(Math.random() * data.elements.length)];
                targetCoords = [t.lat, t.lon];
                targetMarker = L.circleMarker(targetCoords, { color: 'red', radius: 8 }).addTo(map);
                lockLine = L.polyline([userCoords, targetCoords], { color: '#00ff00', weight: 1, dashArray: '5,10' }).addTo(map);
                
                document.getElementById('targetPanel').style.display = 'block';
                document.getElementById('targetName').innerText = t.tags.name || "Unknown Objective";
                speak("Target locked.");
                map.fitBounds(lockLine.getBounds(), { padding: [50, 50] });
            } else {
                speak("No targets found.");
            }
        } catch (e) { speak("Error."); }
    }

    function unlockTarget(v=true) {
        if(targetMarker) map.removeLayer(targetMarker);
        if(lockLine) map.removeLayer(lockLine);
        targetCoords = null;
        document.getElementById('targetPanel').style.display = 'none';
        if(v) speak("Target released.");
    }

    // --- PWA Logic ---
    window.onload = () => {
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        if (!isStandalone) {
            const guide = document.getElementById('install-guide');
            const content = document.getElementById('guide-content');
            if (isIOS) {
                content.innerHTML = `<p dir="rtl">للتثبيت: اضغط <b>مشاركة</b> ثم <b>إضافة للشاشة الرئيسية</b></p><p>To install: Tap <b>Share</b> then <b>Add to Home Screen</b></p>`;
            } else {
                content.innerHTML = `<p dir="rtl">اضغط على <b>النقاط الثلاث</b> ثم <b>تثبيت التطبيق</b></p><p>Tap <b>Three Dots</b> then <b>Install App</b></p>`;
            }
            guide.style.display = 'block';
        }
    };
    document.getElementById('rangeInput').oninput = function() { document.getElementById('rangeVal').innerText = this.value; };
</script>
</body>
</html>
